<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>INFRATEC ISO Coach</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .wrap { max-width: 820px; margin: 0 auto; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input, button, textarea { font-size: 16px; padding: 10px; }
    input, textarea { flex: 1; }
    textarea { height: 120px; }
    .answer { white-space: pre-wrap; background: #f7f7f8; padding: 14px; border-radius: 10px; border: 1px solid #e6e6ea; }
    .small { color: #666; font-size: 13px; }
    .pill { display:inline-block; background:#eef; padding:2px 8px; border-radius:999px; margin-right:6px; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>INFRATEC ISO Coach</h1>
    <div class="row">
      <input id="api" value="https://infratec-iso-bot.onrender.com" />
      <button id="ping">Check /health</button>
    </div>
    <div class="row">
      <textarea id="q" placeholder="Ask a question… e.g. How do we control suppliers?"></textarea>
      <button id="ask">Ask</button>
    </div>
    <div id="status" class="small"></div>
    <h3>Answer</h3>
    <div id="answer" class="answer"></div>
    <h3>Citations</h3>
    <div id="cites" class="small"></div>
  </div>

  <script>
    const $ = sel => document.querySelector(sel);
    const apiInput = $("#api"), q = $("#q"), status = $("#status");
    const answerEl = $("#answer"), citesEl = $("#cites");

    $("#ping").onclick = async () => {
      status.textContent = "Checking /health…";
      try {
        const r = await fetch(apiInput.value + "/health");
        const j = await r.json();
        status.textContent = "Health: " + JSON.stringify(j);
      } catch (e) {
        status.textContent = "Health check failed: " + e;
      }
    };

    $("#ask").onclick = async () => {
      const question = q.value.trim();
      if (!question) { status.textContent = "Type a question first."; return; }
      status.textContent = "Thinking…";
      answerEl.textContent = "";
      citesEl.innerHTML = "";
      try {
        const r = await fetch(apiInput.value + "/ask", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ question })
        });
        const j = await r.json();
        if (j.error) { status.textContent = "Error: " + j.error; return; }
        answerEl.textContent = j.answer || "(no answer)";
        if (Array.isArray(j.citations)) {
          citesEl.innerHTML = j.citations.map(c =>
            `<span class="pill">${(c.doc || "Doc")} (rev ${c.rev})</span>`
          ).join(" ");
        }
        status.textContent = "Done.";
      } catch (e) {
        status.textContent = "Request failed: " + e;
      }
    };
  </script>
</body>
</html>
